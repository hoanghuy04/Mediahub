server:
  port: 8081

spring:
  application:
    name: user-service

  messages:
    basename: i18n/messages, i18n/messages-user

  data:
    mongodb:
      uri: ${MONGODB_URI_USERS}
      auto-index-creation: true
      uuid-representation: standard

  # Kafka Configuration for User Service
  kafka:
    # Producer configuration for user events
    producer:
      client-id: user-service-producer
      retries: 3
      properties:
        max.in.flight.requests.per.connection: 5

    # Consumer configuration for incoming events (if needed)
    consumer:
      group-id: user-service-group
      client-id: user-service-consumer
      max-poll-records: 100

    # Listener configuration
    listener:
      concurrency: 2
      ack-mode: manual

# Service-specific logging overrides
logging:
  level:
    com.bondhub.userservice: DEBUG
    org.springframework.security: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
  file:
    name: logs/user-service.log

# Service-specific resilience4j overrides
resilience4j:
  circuitbreaker:
    instances:
      userService:
        base-config: default

  retry:
    instances:
      userService:
        base-config: default

  timelimiter:
    instances:
      userService:
        base-config: default

# Service-specific security configuration
bondhub:
  security:
    public-endpoints:
      - /users
